<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة الدفع - متجر مودرن</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .checkout-container {
            max-width: 800px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }
        @media (max-width: 768px) {
            .checkout-container { grid-template-columns: 1fr; }
        }
        .payment-methods {
            background: white;
            padding: 30px;
            border-radius: 24px;
            box-shadow: var(--shadow);
        }
        .method-card {
            border: 2px solid #f1f5f9;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .method-card:hover { border-color: var(--primary); background: #f0fdf4; }
        .method-card.selected { border-color: var(--primary); background: #f0fdf4; }
        .method-icon {
            width: 50px;
            height: 50px;
            background: #f8fafc;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .method-info h4 { margin-bottom: 4px; }
        .method-info p { font-size: 13px; color: var(--text-light); }
        .badge-bnpl {
            background: #10b981;
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-right: 8px;
        }
        .summary-card {
            background: white;
            padding: 25px;
            border-radius: 18px;
            box-shadow: var(--shadow);
            height: fit-content;
        }
        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f1f5f9;
        }
        .summary-total {
            display: flex;
            justify-content: space-between;
            font-weight: 800;
            font-size: 20px;
            margin-top: 10px;
        }
        .confirm-btn {
            width: 100%;
            margin-top: 25px;
            padding: 18px;
            background: var(--text);
            color: white;
            border: none;
            border-radius: 14px;
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .confirm-btn:hover { opacity: 0.9; }
        .confirm-btn.bnpl { background: var(--primary); }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">متجر <span>مودرن</span></div>
        </div>
    </header>

    <main class="container">
        <div class="checkout-container">
            <div class="payment-methods">
                <h2 style="margin-bottom: 25px;">اختر وسيلة الدفع</h2>
                
                <!-- Credit Card -->
                <div class="method-card selected" data-method="card">
                    <div class="method-icon">💳</div>
                    <div class="method-info">
                        <h4>بطاقة ائتمان / مدى</h4>
                        <p>الدفع الآمن باستخدام بطاقتك البنكية</p>
                    </div>
                </div>

                <!-- Apple Pay -->
                <div class="method-card" data-method="apple">
                    <div class="method-icon">🍎</div>
                    <div class="method-info">
                        <h4>Apple Pay</h4>
                        <p>الدفع السريع والآمن من Apple</p>
                    </div>
                </div>

                <!-- Bank Transfer -->
                <div class="method-card" data-method="transfer">
                    <div class="method-icon">💸</div>
                    <div class="method-info">
                        <h4>تحويل بنكي</h4>
                        <p>التحويل المباشر لحساب المتجر</p>
                    </div>
                </div>
            </div>

            <div class="summary-card">
                <h3 style="margin-bottom: 20px;">ملخص الطلب</h3>
                <div id="summaryItems">
                    <!-- Items will be injected -->
                </div>
                <div class="summary-total">
                    <span>الإجمالي</span>
                    <span id="totalAmount">0.00 JOD</span>
                </div>
                <button class="confirm-btn" id="confirmPayment">إتمام الطلب</button>
            </div>
        </div>
    </main>

    <div class="loader-overlay" id="loader">
        <div class="loader"></div>
        <p id="loaderText">جاري المعالجة...</p>
    </div>

    <script src="script.js"></script>
    <script>
        // Specific logic for checkout page
        document.addEventListener('DOMContentLoaded', () => {
            const product = JSON.parse(localStorage.getItem('selectedProduct'));
            if (!product) {
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('totalAmount').textContent = `${product.price.toFixed(2)} JOD`;
            document.getElementById('summaryItems').innerHTML = `
                <div class="summary-item">
                    <span>${product.name}</span>
                    <span>${product.price.toFixed(2)} JOD</span>
                </div>
            `;

            const methods = document.querySelectorAll('.method-card');
            const confirmBtn = document.getElementById('confirmPayment');

            methods.forEach(card => {
                card.addEventListener('click', () => {
                    methods.forEach(m => m.classList.remove('selected'));
                    card.classList.add('selected');
                });
            });

            confirmBtn.addEventListener('click', async () => {
                alert('هذه الوسيلة للعرض فقط في هذا المتجر التجريبي.');
            });
        });
    </script>
</body>
</html>
