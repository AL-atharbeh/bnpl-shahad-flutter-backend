<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاكاة لوحة الإدارة - صاحب التطبيق</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .admin-container {
            max-width: 1000px;
            margin: 40px auto;
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: var(--shadow);
        }
        .store-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .store-table th, .store-table td {
            padding: 15px;
            text-align: right;
            border-bottom: 1px solid #e2e8f0;
        }
        .store-table th { background: #f8fafc; font-weight: 700; }
        .btn-approve {
            background: #10b981;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-reject {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            margin-right: 5px;
        }
        .status-pending { color: #f59e0b; font-weight: 700; }
        .status-approved { color: #10b981; font-weight: 700; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">شهد <span>BNPL</span> - لوحة التحكم (محاكاة الأدمن)</div>
        </div>
    </header>

    <main class="container">
        <div class="admin-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h2>إدارة المتاجر والطلبات</h2>
                <button class="buy-btn" onclick="loadStores()">تحديث القائمة 🔄</button>
            </div>

            <div id="adminLoader" class="loader" style="display:none; margin: 20px auto;"></div>

            <table class="store-table">
                <thead>
                    <tr>
                        <th>اسم المتجر</th>
                        <th>الحالة</th>
                        <th>تاريخ الطلب</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="storesList">
                    <!-- Stores will be loaded here -->
                </tbody>
            </table>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadStores);

        async function loadStores() {
            const list = document.getElementById('storesList');
            const loader = document.getElementById('adminLoader');
            loader.style.display = 'block';
            list.innerHTML = '';

            try {
                // We use the admin endpoint to get all stores
                const response = await fetch(`${API_BASE_URL}/stores/admin/all`);
                const result = await response.json();

                if (result.success) {
                    result.data.forEach(store => {
                        const row = document.createElement('tr');
                        const isPending = store.status === 'pending';
                        
                        row.innerHTML = `
                            <td>${store.nameAr || store.name}</td>
                            <td class="status-${store.status}">${isPending ? '⏳ معلق' : '✅ معتمد'}</td>
                            <td>${new Date(store.createdAt).toLocaleDateString('ar-EG')}</td>
                            <td>
                                ${isPending ? `
                                    <button class="btn-approve" onclick="updateStatus(${store.id}, 'approved')">موافقة</button>
                                    <button class="btn-reject" onclick="updateStatus(${store.id}, 'rejected')">رفض</button>
                                ` : `
                                    <span style="font-size: 12px; color: #64748b;">API Key: ${store.apiKey}</span>
                                `}
                            </td>
                        `;
                        list.appendChild(row);
                    });
                }
            } catch (err) {
                console.error(err);
                list.innerHTML = '<tr><td colspan="4" style="text-align:center; color:red;">خطأ في تحميل البيانات</td></tr>';
            } finally {
                loader.style.display = 'none';
            }
        }

        async function updateStatus(id, status) {
            if (!confirm(`هل أنت متأكد من ${status === 'approved' ? 'الموافقة على' : 'رفض'} هذا المتجر؟`)) return;

            try {
                const response = await fetch(`${API_BASE_URL}/stores/admin/${id}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });
                const result = await response.json();

                if (result.success) {
                    alert('تم تحديث الحالة بنجاح! تم توليد مفاتيح الربط لهذا المتجر.');
                    loadStores();
                }
            } catch (err) {
                alert('فشل في تحديث الحالة');
            }
        }
    </script>
</body>
</html>
