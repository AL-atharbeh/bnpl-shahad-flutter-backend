<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شهد | تأكيد التقسيط</title>
    <!-- Readex Pro Font for modern professional Arabic typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #006D44;
            --primary-light: #10B981;
            --secondary: #0F172A;
            --text-main: #1E293B;
            --text-muted: #64748B;
            --bg-body: #F8FAFC;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.3);
            --card-shadow: 0 10px 40px -10px rgba(0, 109, 68, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Readex Pro', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            background-image: 
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 109, 68, 0.05) 0px, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            overflow-x: hidden;
        }

        .main-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .portal-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--card-shadow);
            padding: 32px;
            position: relative;
            overflow: hidden;
        }

        /* Branding section */
        .brand-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 12px;
        }

        .logo-img {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            object-fit: cover;
            box-shadow: 0 8px 16px rgba(0, 109, 68, 0.15);
        }

        .brand-name {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        .brand-tagline {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
            font-weight: 300;
        }

        /* Summary Section */
        .summary-box {
            background: rgba(0, 109, 68, 0.03);
            border: 1px dashed rgba(0, 109, 68, 0.2);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .summary-item label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .summary-item span {
            font-size: 18px;
            font-weight: 600;
            color: var(--secondary);
        }

        .amount-highlight {
            color: var(--primary) !important;
            font-size: 22px !important;
            font-weight: 700 !important;
        }

        /* Installments Section */
        .section-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(0, 0, 0, 0.05);
        }

        .installments-timeline {
            position: relative;
            margin-bottom: 32px;
        }

        .installment-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
            position: relative;
        }

        .installment-row:not(:last-child)::before {
            content: '';
            position: absolute;
            right: 17px;
            top: 30px;
            bottom: -10px;
            width: 1px;
            background: rgba(0, 109, 68, 0.2);
            border-radius: 1px;
        }

        .dot {
            width: 36px;
            height: 36px;
            background: white;
            border: 2px solid var(--primary-light);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
            flex-shrink: 0;
            z-index: 1;
            box-shadow: 0 4px 10px rgba(0, 109, 68, 0.1);
        }

        .dot.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .installment-info {
            flex-grow: 1;
        }

        .installment-info .date {
            font-size: 13px;
            color: var(--text-muted);
            display: block;
        }

        .installment-info .label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
        }

        .installment-val {
            font-size: 15px;
            font-weight: 600;
            color: var(--primary);
        }

        /* Auth Form */
        .auth-container {
            margin-top: 24px;
        }

        .input-group {
            position: relative;
            margin-bottom: 24px;
        }

        .input-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .modern-input {
            width: 100%;
            height: 56px;
            background: white;
            border: 1.5px solid #E2E8F0;
            border-radius: 16px;
            padding: 0 20px;
            font-size: 17px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--secondary);
            text-align: left;
            direction: ltr;
        }

        .modern-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(0, 109, 68, 0.08);
            transform: translateY(-1px);
        }

        .btn-primary {
            width: 100%;
            height: 58px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px -5px rgba(0, 109, 68, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-primary:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(0, 109, 68, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            background: #CBD5E1;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Footer Info */
        .footer-info {
            margin-top: 24px;
            text-align: center;
        }

        .safe-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.03);
            padding: 6px 14px;
            border-radius: 100px;
        }

        .power-by {
            font-size: 11px;
            color: #94A3B8;
            margin-top: 16px;
        }

        /* Loader Overlay */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        #loader.active {
            display: flex;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 109, 68, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive Tweaks */
        @media (max-width: 400px) {
            .portal-card {
                padding: 24px;
            }
            .brand-name {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="portal-card">
            <!-- Header Section -->
            <div class="brand-header">
                <div class="logo-wrapper">
                    <img src="https://enthusiastic-stillness-production-5dce.up.railway.app/store-test/logo_shahad.png" alt="Shahad" class="logo-img">
                </div>
                <h1 class="brand-name">Shāhad</h1>
                <p class="brand-tagline">نقسم مشترياتك بكل سهولة وأمان</p>
            </div>

            <!-- Order Summary -->
            <div class="summary-box">
                <div class="summary-item">
                    <label>المتجر</label>
                    <span id="storeName">...</span>
                </div>
                <div class="summary-item" style="text-align: left;">
                    <label>إجمالي الطلب</label>
                    <span id="totalAmount" class="amount-highlight">0.00 JOD</span>
                </div>
            </div>

            <!-- Plan Preview -->
            <div class="section-title">خطة التقسيط المرنة</div>
            <div class="installments-timeline" id="installmentsList">
                <!-- Will be populated by JS -->
                <div class="installment-row">
                    <div class="dot active">1</div>
                    <div class="installment-info">
                        <span class="label">الدفعة الأولى (الآن)</span>
                        <span class="date">الدفع عند المراجعة</span>
                    </div>
                </div>
            </div>

            <!-- Auth Form -->
            <div id="authStep">
                <div class="input-group">
                    <label class="input-label">رقم الجوال لتسجيل الدخول</label>
                    <input type="tel" id="phoneInput" class="modern-input" placeholder="962 7X XXX XXXX" maxlength="15">
                </div>
                <button id="loginBtn" class="btn-primary" onclick="sendOtp()">
                    تسجيل الدخول والمتابعة
                </button>
            </div>

            <!-- OTP Step (Hidden) -->
            <div id="otpStep" style="display: none;">
                <div class="input-group">
                    <label class="input-label">أدخل رمز التحقق (OTP)</label>
                    <input type="text" id="otpInput" class="modern-input" placeholder="XXXXXX" maxlength="6" style="letter-spacing: 8px; text-align: center;">
                </div>
                <button id="verifyBtn" class="btn-primary" onclick="verifyOtp()">
                    تحقق وتوجيه للدفع
                </button>
                <div style="text-align: center; margin-top: 12px;">
                    <button class="power-by" style="background:none; border:none; cursor:pointer;" onclick="resendOtp()">إعادة إرسال الرمز؟</button>
                </div>
            </div>

            <!-- Footer Badge -->
            <div class="footer-info">
                <div class="safe-badge">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                    دفع آمن 100% مشفر بواسطة Stripe
                </div>
                <div class="power-by">Powered by Shahad BNPL Solutions</div>
            </div>
        </div>
    </div>

    <!-- Loader -->
    <div id="loader">
        <div class="spinner"></div>
    </div>

    <script>
        const sessionId = window.location.pathname.split('/').pop();
        const apiBaseUrl = '/api/v1';

        // Load Session Data
        async function fetchSession() {
            try {
                const response = await fetch(`${apiBaseUrl}/sessions/${sessionId}`);
                const data = await response.json();
                
                if (data) {
                    const totalAmount = data.totalAmount || data.total_amount;
                    const installmentsCount = data.installmentsCount || data.installments_count || 4;
                    const currency = data.currency || 'JOD';
                    const storeName = data.store?.nameAr || data.store?.name || 'متجر مودرن';

                    document.getElementById('storeName').textContent = storeName;
                    document.getElementById('totalAmount').textContent = `${parseFloat(totalAmount).toFixed(2)} ${currency}`;
                    
                    const installmentAmount = (parseFloat(totalAmount) / installmentsCount).toFixed(2);
                    const list = document.getElementById('installmentsList');
                    list.innerHTML = '';

                    const today = new Date();
                    for (let i = 0; i < installmentsCount; i++) {
                        const dueDate = new Date(today);
                        dueDate.setMonth(today.getMonth() + i);
                        
                        const row = document.createElement('div');
                        row.className = 'installment-row';
                        row.innerHTML = `
                            <div class="dot ${i === 0 ? 'active' : ''}">${i + 1}</div>
                            <div class="installment-info">
                                <span class="label">${i === 0 ? 'الدفعة الأولى (الآن)' : 'الدفعة ' + (i+1)}</span>
                                <span class="date">${i === 0 ? 'تُدفع الآن' : dueDate.toLocaleDateString('ar-JO', {month: 'long', day: 'numeric'})}</span>
                            </div>
                            <div class="installment-val">${installmentAmount} ${currency}</div>
                        `;
                        list.appendChild(row);
                    }
                }
            } catch (err) {
                console.error('Failed to fetch session', err);
            }
        }

        // Phone Normalization Helper
        function normalizePhone(phone) {
            let p = phone.trim().replace(/\+/g, '').replace(/\s/g, '');
            if (p.startsWith('0')) {
                // Convert 07XXXXXXXX to 9627XXXXXXXX
                p = '962' + p.substring(1);
            } else if (p.length === 9 && (p.startsWith('77') || p.startsWith('78') || p.startsWith('79'))) {
                // Convert 7XXXXXXXX to 9627XXXXXXXX
                p = '962' + p;
            }
            return p;
        }

        // Auth Logic
        async function sendOtp() {
            let phone = document.getElementById('phoneInput').value;
            if (!phone) return alert('الرجاء إدخال رقم الجوال');

            // Normalize before sending
            phone = normalizePhone(phone);

            showLoader(true);
            try {
                const res = await fetch(`${apiBaseUrl}/sessions/${sessionId}/send-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone })
                });
                const result = await res.json();
                if (result.success) {
                    document.getElementById('authStep').style.display = 'none';
                    document.getElementById('otpStep').style.display = 'block';
                } else {
                    alert(result.message || 'خطأ في إرسال الرمز');
                }
            } catch (error) {
                alert('حدث خطأ فني');
            } finally {
                showLoader(false);
            }
        }

        async function verifyOtp() {
            const otp = document.getElementById('otpInput').value;
            if (!otp) return alert('الرجاء إدخال الرمز');

            showLoader(true);
            try {
                const res = await fetch(`${apiBaseUrl}/sessions/${sessionId}/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ otp })
                });
                const result = await res.json();
                if (result.success && result.payment_url) {
                    window.location.href = result.payment_url;
                } else {
                    alert(result.message || 'الرمز غير صحيح');
                }
            } catch (error) {
                alert('حدث خطأ أثناء التحقق');
            } finally {
                showLoader(false);
            }
        }

        function showLoader(show) {
            document.getElementById('loader').classList.toggle('active', show);
        }

        function resendOtp() {
            document.getElementById('otpStep').style.display = 'none';
            document.getElementById('authStep').style.display = 'block';
        }

        // Startup
        fetchSession();
    </script>
</body>
</html>
